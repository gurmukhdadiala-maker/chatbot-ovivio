<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ovivio Support Assistant</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      height: 64px;
      background: #1f4fa3;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 20px;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .subtext {
      font-size: 13px;
      font-weight: 400;
      margin-left: 12px;
      opacity: 0.85;
    }

    .chat-container {
      height: calc(100vh - 64px);
      position: relative;
    }

    /* Expand Zendesk Widget */
    iframe {
      max-height: 100% !important;
      max-width: 100% !important;
    }
  </style>
</head>

<body>

  <div class="header">
    Ovivio Support Assistant
    <div class="subtext">
      AI-guided help for Flexkids SaaS 2.0
    </div>
  </div>

  <div class="chat-container"></div>

  <script>
    window.zESettings = {
      webWidget: {
        chat: {
          suppress: false
        }
      }
    };
  </script>

  <script
    id="ze-snippet"
    src="https://static.zdassets.com/ekr/snippet.js?key=2c76e3e9-9c41-451a-ab43-c2dc60be992e">
  </script>

  <script>
    window.onload = function () {

      if (window.zE) {

        // Open widget automatically
        window.zE('webWidget', 'open');

        // Optional: Hide launcher button
        window.zE('webWidget', 'hide');

      }
    };
  </script>

</body>

</html>
